name: Daily Shipping Report
on:
  schedule:
    - cron: '0 13 * * 1-6'  # 1pm UTC = 5am PST (6am PDT), Mon-Sat
  workflow_dispatch:          # Manual trigger for testing

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate screenshot and report data
        run: node daily-report.js --screenshot

      - name: Clean up screenshots older than 30 days
        run: |
          cd screenshots
          find . -name '????-??-??.png' -mtime +30 -delete 2>/dev/null || true
          cd ..

      - name: Commit and push screenshot + OG update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ index.html
          git diff --cached --quiet || git commit -m "Update daily heatmap screenshot"
          git push

      - name: Wait for GitHub Pages deployment
        run: sleep 90

      - name: Post report to Slack
        run: node daily-report.js --post
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
