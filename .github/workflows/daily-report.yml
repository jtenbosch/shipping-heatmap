name: Daily Shipping Report
on:
  schedule:
    - cron: '0 13 * * 1-6'  # 1pm UTC = 5am PST (6am PDT), Mon-Sat
  workflow_dispatch:          # Manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate screenshot and report data
        id: screenshot
        continue-on-error: true
        run: node daily-report.js --screenshot

      - name: Clean up screenshots older than 30 days
        if: steps.screenshot.outcome == 'success'
        run: |
          cd screenshots
          find . -name '????-??-??.png' -mtime +30 -delete 2>/dev/null || true
          cd ..

      - name: Commit and push screenshot + OG update
        if: steps.screenshot.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/ index.html
          git diff --cached --quiet || git commit -m "Update daily heatmap screenshot"
          git push

      - name: Deploy to GitHub Pages
        if: steps.screenshot.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.screenshot.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        if: steps.screenshot.outcome == 'success'
        id: pages-deploy
        uses: actions/deploy-pages@v4

      - name: Wait for Pages CDN propagation
        if: steps.screenshot.outcome == 'success'
        run: sleep 30

      - name: Post report to Slack
        run: node daily-report.js --post
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
